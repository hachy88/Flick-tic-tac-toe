<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Physics Curling AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d1b2a, #1b263b);
            overflow: hidden;
            user-select: none;
        }

        #gameCanvas {
            display: block;
            cursor: grab;
        }

        #gameCanvas:active {
            cursor: grabbing;
        }

        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .ui-element {
            pointer-events: auto;
        }

        #scoreboard {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #fff;
            backdrop-filter: blur(5px);
        }

        #turnDisplay {
            margin-top: 10px;
            font-size: 22px;
        }

        /* サブカメラ用のUIフレーム */
        #minimapFrame {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 240px;
            height: 240px;
            border: 3px solid #2196F3;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            /* WebGLの背景とブレンド */
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
        }

        #gameStatus {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px 50px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            border: 3px solid #FFD700;
            display: none;
            backdrop-filter: blur(10px);
        }

        #controlButtons {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }

        .control-btn {
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border: 2px solid #2196F3;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(33, 150, 243, 0.3);
            transform: translateY(-2px);
        }

        #webcamVideo {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 160px;
            height: 120px;
            border-radius: 8px;
            border: 2px solid #2196F3;
            transform: scaleX(-1);
            opacity: 0.8;
            z-index: 90;
            object-fit: cover;
        }

        #handCursor {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: rgba(0, 255, 100, 0.6);
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 200;
            transform: translate(-50%, -50%);
            display: none;
            box-shadow: 0 0 15px rgba(0, 255, 100, 0.8);
            transition: background-color 0.2s;
        }

        #loadingMsg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            font-weight: bold;
            z-index: 1000;
        }
    </style>
    <script src="https://unpkg.com/ammo.js@0.0.10/ammo.js"></script>
</head>

<body>
    <div id="loadingMsg">Initializing Physics Engine & AI Models...</div>
    <canvas id="gameCanvas"></canvas>
    <video id="webcamVideo" autoplay playsinline muted></video>
    <div id="handCursor"></div>

    <div id="uiOverlay">
        <div id="scoreboard" class="ui-element">
            <div>Score - Red: <span id="scoreRed">0</span> | Yellow: <span id="scoreYellow">0</span></div>
            <div>Stones Left: <span id="stonesLeft">8</span></div>
            <div id="turnDisplay" style="color: #ff4444;">Red's Turn</div>
        </div>
        <div id="minimapFrame" class="ui-element"></div>
        <div id="controlButtons">
            <button id="restartBtn" class="control-btn ui-element">Restart Game</button>
        </div>
        <div id="gameStatus" class="ui-element"></div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { FilesetResolver, HandLandmarker } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/vision_bundle.js';

        // --- 信号平滑化フィルタ (1e Filter) ---
        class OneEuroFilter {
            constructor(minCutoff = 1.0, beta = 0.0, dcutoff = 1.0) {
                this.minCutoff = minCutoff; this.beta = beta; this.dcutoff = dcutoff;
                this.xPrev = null; this.dxPrev = null; this.tPrev = null;
            }
            reset() { this.xPrev = null; this.dxPrev = null; this.tPrev = null; }
            filter(t, x) {
                if (this.tPrev === null) {
                    this.xPrev = x; this.dxPrev = 0; this.tPrev = t; return x;
                }
                const dt = (t - this.tPrev) / 1000.0;
                this.tPrev = t;
                const dx = (x - this.xPrev) / dt;
                const edx = this.lowPassFilter(this.alpha(this.dcutoff, dt), dx, this.dxPrev);
                this.dxPrev = edx;
                const cutoff = this.minCutoff + this.beta * Math.abs(edx);
                const ex = this.lowPassFilter(this.alpha(cutoff, dt), x, this.xPrev);
                this.xPrev = ex;
                return ex;
            }
            alpha(cutoff, dt) { const r = 2 * Math.PI * cutoff * dt; return r / (r + 1); }
            lowPassFilter(alpha, x, xPrev) { return alpha * x + (1.0 - alpha) * xPrev; }
        }

        // --- ハンドトラッキング入力層 ---
        class HandInputManager {
            constructor(videoElement, cursorElement) {
                this.video = videoElement; this.cursor = cursorElement;
                this.isEnabled = false; this.lastVideoTime = -1;
                this.filterX = new OneEuroFilter(1.0, 0.005);
                this.filterY = new OneEuroFilter(1.0, 0.005);
                this.config = { sensitivity: 1.5 };
                this.cursorPos = new THREE.Vector2(0, 0);
                this.velocity = new THREE.Vector2(0, 0);
            }
            async initialize() {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                this.handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`, delegate: "GPU" },
                    runningMode: "VIDEO", numHands: 1
                });
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                this.video.srcObject = stream;
                await new Promise(r => { this.video.onloadedmetadata = () => { r(this.video.play()); }; });
                this.isEnabled = true;
            }
            update() {
                if (!this.isEnabled || !this.handLandmarker) return null;
                if (this.video.currentTime !== this.lastVideoTime) {
                    this.lastVideoTime = this.video.currentTime;
                    const results = this.handLandmarker.detectForVideo(this.video, performance.now());
                    if (results.landmarks && results.landmarks.length > 0) {
                        const indexTip = results.landmarks[0][8];
                        const timestamp = performance.now();
                        let rawX = (1 - indexTip.x) * 2 - 1;
                        let rawY = -(indexTip.y * 2 - 1);
                        const scaledX = this.filterX.filter(timestamp, rawX) * this.config.sensitivity;
                        const scaledY = this.filterY.filter(timestamp, rawY) * this.config.sensitivity;

                        const prevPos = this.cursorPos.clone();
                        this.cursorPos.set(Math.max(-1, Math.min(1, scaledX)), Math.max(-1, Math.min(1, scaledY)));
                        this.velocity.subVectors(this.cursorPos, prevPos);

                        this.cursor.style.display = 'block';
                        this.cursor.style.left = `${(this.cursorPos.x + 1) / 2 * window.innerWidth}px`;
                        this.cursor.style.top = `${-(this.cursorPos.y - 1) / 2 * window.innerHeight}px`;
                        return { position: this.cursorPos, velocity: this.velocity };
                    } else {
                        this.cursor.style.display = 'none';
                        this.filterX.reset(); this.filterY.reset();
                    }
                }
                return null;
            }
        }

        // --- コアロジック (Physics Curling) ---
        class CurlingEngine {
            constructor() {
                this.STONES_PER_END = 8;
                this.TARGET_POS = new THREE.Vector3(0, 0, -12); // ティーの座標
                this.HOUSE_RADIUS = 3.0;
                this.STONE_RADIUS = 0.4;
                this.STONE_MASS = 2.0;

                this.params = { throwStrength: 18.0, flickThreshold: 0.03, iceFriction: 0.3, stoneFriction: 0.3 };

                this.scores = { Red: 0, Yellow: 0 };
                this.turnIndex = 0;
                this.currentPlayer = 'Red';
                this.stones = [];
                this.activeStone = null;
                this.settling = false;
                this.gameOver = false;

                this.clock = new THREE.Clock();
                this.raycaster = new THREE.Raycaster();

                this.initGraphics();
                this.initPhysics();
                this.buildEnvironment();
                this.setupUI();
                this.setupResizeHandler();

                this.handManager = new HandInputManager(document.getElementById('webcamVideo'), document.getElementById('handCursor'));

                this.handManager.initialize().then(() => {
                    document.getElementById('loadingMsg').style.display = 'none';
                    this.spawnStone();
                    this.animate();
                });
            }

            initGraphics() {
                this.canvas = document.getElementById('gameCanvas');
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x0a1128);

                // --- 1. メインカメラ (投球視点) ---
                this.camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 4.5, 15);
                this.camera.lookAt(0, 0, -3);

                // --- 2. サブカメラ (真俯瞰の直交投影) ---
                // ハウス半径(3.0)が収まるように表示領域(左右上下4.0)を設定
                const mapSize = 4.0;
                this.topCamera = new THREE.OrthographicCamera(-mapSize, mapSize, mapSize, -mapSize, 0.1, 50);
                this.topCamera.position.set(this.TARGET_POS.x, 10, this.TARGET_POS.z);
                this.topCamera.lookAt(this.TARGET_POS);

                this.renderer = new THREE.WebGLRenderer({ canvas: this.canvas, antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;

                // ビューポートによる多重描画のため、自動クリアを無効化
                this.renderer.autoClear = false;

                this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
                dirLight.position.set(10, 20, 10);
                dirLight.castShadow = true;
                dirLight.shadow.camera.top = 20; dirLight.shadow.camera.bottom = -20;
                this.scene.add(dirLight);
            }

            setupResizeHandler() {
                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            initPhysics() {
                this.collisionConfig = new Ammo.btDefaultCollisionConfiguration();
                this.dispatcher = new Ammo.btCollisionDispatcher(this.collisionConfig);
                this.broadphase = new Ammo.btDbvtBroadphase();
                this.solver = new Ammo.btSequentialImpulseConstraintSolver();
                this.world = new Ammo.btDiscreteDynamicsWorld(this.dispatcher, this.broadphase, this.solver, this.collisionConfig);
                this.world.setGravity(new Ammo.btVector3(0, -9.82, 0));
                this.tmpTrans = new Ammo.btTransform();
            }

            buildEnvironment() {
                const rinkWidth = 8, rinkLength = 35;
                const geo = new THREE.BoxGeometry(rinkWidth, 0.5, rinkLength);
                const mat = new THREE.MeshStandardMaterial({ color: 0x88ccff, roughness: 0.1, metalness: 0.1, transparent: true, opacity: 0.8 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = -0.25;
                mesh.position.z = -5;
                mesh.receiveShadow = true;
                this.scene.add(mesh);

                const shape = new Ammo.btBoxShape(new Ammo.btVector3(rinkWidth / 2, 0.25, rinkLength / 2));
                const trans = new Ammo.btTransform(); trans.setIdentity(); trans.setOrigin(new Ammo.btVector3(0, -0.25, -5));
                const rbInfo = new Ammo.btRigidBodyConstructionInfo(0, new Ammo.btDefaultMotionState(trans), shape, new Ammo.btVector3(0, 0, 0));
                rbInfo.set_m_friction(this.params.iceFriction);
                rbInfo.set_m_restitution(0.5);
                this.world.addRigidBody(new Ammo.btRigidBody(rbInfo));

                const rings = [
                    { r: 3.0, c: 0x0000ff }, // 青
                    { r: 2.0, c: 0xffffff }, // 白
                    { r: 1.0, c: 0xff0000 }, // 赤
                    { r: 0.3, c: 0xffffff }  // ティー
                ];
                rings.forEach(ring => {
                    const rGeo = new THREE.CylinderGeometry(ring.r, ring.r, 0.01, 32);
                    const rMat = new THREE.MeshBasicMaterial({ color: ring.c });
                    const rMesh = new THREE.Mesh(rGeo, rMat);
                    rMesh.position.set(this.TARGET_POS.x, 0.01, this.TARGET_POS.z);
                    this.scene.add(rMesh);
                });
            }

            spawnStone() {
                if (this.turnIndex >= this.STONES_PER_END) {
                    this.calculateEndScore();
                    return;
                }

                this.currentPlayer = this.turnIndex % 2 === 0 ? 'Red' : 'Yellow';
                this.updateUI();

                const startPos = new THREE.Vector3(0, this.STONE_RADIUS, 6);
                const geo = new THREE.CylinderGeometry(this.STONE_RADIUS, this.STONE_RADIUS, 0.3, 32);
                const color = this.currentPlayer === 'Red' ? 0xff4444 : 0xffdd44;
                const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.castShadow = true; mesh.position.copy(startPos);
                this.scene.add(mesh);

                const shape = new Ammo.btCylinderShape(new Ammo.btVector3(this.STONE_RADIUS, 0.15, this.STONE_RADIUS));
                const trans = new Ammo.btTransform(); trans.setIdentity();
                trans.setOrigin(new Ammo.btVector3(startPos.x, startPos.y, startPos.z));
                const inertia = new Ammo.btVector3(0, 0, 0);
                shape.calculateLocalInertia(this.STONE_MASS, inertia);
                const rbInfo = new Ammo.btRigidBodyConstructionInfo(this.STONE_MASS, new Ammo.btDefaultMotionState(trans), shape, inertia);

                rbInfo.set_m_friction(this.params.stoneFriction);
                rbInfo.set_m_restitution(0.8);

                const body = new Ammo.btRigidBody(rbInfo);
                body.setLinearFactor(new Ammo.btVector3(0, 0, 0));
                body.setAngularFactor(new Ammo.btVector3(0, 0, 0));

                this.world.addRigidBody(body);
                this.activeStone = { mesh, body, player: this.currentPlayer, valid: true };
                this.stones.push(this.activeStone);
                this.settling = false;
            }

            handleInput() {
                const data = this.handManager.update();
                if (!data || !this.activeStone || this.settling || this.gameOver) return;

                this.raycaster.setFromCamera(data.position, this.camera);
                const intersects = this.raycaster.intersectObject(this.activeStone.mesh);

                if (intersects.length > 0) {
                    this.activeStone.mesh.material.emissive.setHex(0x333333);
                    document.getElementById('handCursor').style.borderColor = "#FFEB3B";

                    if (data.velocity.y > this.params.flickThreshold) {
                        this.throwStone(data.velocity);
                    }
                } else {
                    this.activeStone.mesh.material.emissive.setHex(0x000000);
                    document.getElementById('handCursor').style.borderColor = "white";
                }
            }

            throwStone(velocity) {
                const body = this.activeStone.body;
                this.activeStone.mesh.material.emissive.setHex(0x000000);

                body.setLinearFactor(new Ammo.btVector3(1, 1, 1));
                body.setAngularFactor(new Ammo.btVector3(1, 1, 1));
                body.activate(true);

                const forceX = velocity.x * this.params.throwStrength * 5;
                const forceZ = -velocity.y * this.params.throwStrength * 10;

                body.applyCentralImpulse(new Ammo.btVector3(forceX, 0, forceZ));
                body.setAngularVelocity(new Ammo.btVector3(0, (Math.random() - 0.5) * 5, 0));

                this.activeStone = null;
                this.settling = true;
                this.turnIndex++;
            }

            checkSettlement() {
                if (!this.settling) return;
                let allResting = true;

                this.stones.forEach(s => {
                    if (!s.valid) return;
                    const v = s.body.getLinearVelocity().length();
                    const a = s.body.getAngularVelocity().length();
                    s.body.getMotionState().getWorldTransform(this.tmpTrans);
                    const pos = this.tmpTrans.getOrigin();

                    if (pos.y() < -1.0) {
                        s.valid = false;
                        this.scene.remove(s.mesh);
                    } else if (v > 0.1 || a > 0.1) {
                        allResting = false;
                    }
                });

                if (allResting) {
                    this.settling = false;
                    setTimeout(() => this.spawnStone(), 500);
                }
            }

            calculateEndScore() {
                this.gameOver = true;
                let validStones = this.stones.filter(s => s.valid).map(s => {
                    s.body.getMotionState().getWorldTransform(this.tmpTrans);
                    const pos = this.tmpTrans.getOrigin();
                    const pVec = new THREE.Vector3(pos.x(), 0, pos.z());
                    const dist = pVec.distanceTo(this.TARGET_POS);
                    return { player: s.player, dist: dist };
                });

                validStones = validStones.filter(s => s.dist <= this.HOUSE_RADIUS);
                validStones.sort((a, b) => a.dist - b.dist);

                let roundScore = 0;
                let winningPlayer = null;

                if (validStones.length > 0) {
                    winningPlayer = validStones[0].player;
                    roundScore = 1;
                    for (let i = 1; i < validStones.length; i++) {
                        if (validStones[i].player === winningPlayer) {
                            roundScore++;
                        } else {
                            break;
                        }
                    }
                    this.scores[winningPlayer] += roundScore;
                }

                this.showResult(winningPlayer, roundScore);
            }

            setupUI() {
                document.getElementById('restartBtn').addEventListener('click', () => location.reload());
            }

            updateUI() {
                document.getElementById('turnDisplay').textContent = `${this.currentPlayer}'s Turn`;
                document.getElementById('turnDisplay').style.color = this.currentPlayer === 'Red' ? '#ff4444' : '#ffdd44';
                document.getElementById('stonesLeft').textContent = this.STONES_PER_END - this.turnIndex;
                document.getElementById('scoreRed').textContent = this.scores.Red;
                document.getElementById('scoreYellow').textContent = this.scores.Yellow;
            }

            showResult(winner, score) {
                const status = document.getElementById('gameStatus');
                if (winner) {
                    status.innerHTML = `End Finished!<br>${winner} Scores ${score} Point(s)!`;
                } else {
                    status.innerHTML = `End Finished!<br>Blank End (No Score)`;
                }
                status.style.display = 'block';
                this.updateUI();
            }

            animate() {
                requestAnimationFrame(this.animate.bind(this));
                const dt = this.clock.getDelta();

                this.handleInput();
                this.world.stepSimulation(dt, 10);

                this.stones.forEach(s => {
                    if (s.valid && s.body.getMotionState()) {
                        s.body.getMotionState().getWorldTransform(this.tmpTrans);
                        const p = this.tmpTrans.getOrigin();
                        const q = this.tmpTrans.getRotation();
                        s.mesh.position.set(p.x(), p.y(), p.z());
                        s.mesh.quaternion.set(q.x(), q.y(), q.z(), q.w());
                    }
                });

                this.checkSettlement();

                // --- マルチビューポートレンダリング ---
                // 1. 全画面のクリアとメインカメラ描画
                this.renderer.clear();
                this.renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
                this.renderer.setScissorTest(false);
                this.renderer.render(this.scene, this.camera);

                // 2. 右上のミニマップ描画
                // #minimapFrame のCSS(width:240, height:240, top:20, right:20)に基づく座標計算
                // WebGLのY座標は下基準であるため反転が必要
                const mapW = 240, mapH = 240, paddingX = 20, paddingY = 20;
                const mapX = window.innerWidth - mapW - paddingX;
                const mapY = window.innerHeight - mapH - paddingY;

                this.renderer.setViewport(mapX, mapY, mapW, mapH);
                this.renderer.setScissor(mapX, mapY, mapW, mapH);
                this.renderer.setScissorTest(true);

                // ミニマップ描画前に深度バッファのみクリア（メイン画面の手前に描画させるため）
                this.renderer.clear(false, true, false);
                this.renderer.render(this.scene, this.topCamera);
            }
        }

        window.onload = () => {
            if (typeof Ammo === 'function') {
                Ammo().then(function (AmmoLib) {
                    window.Ammo = AmmoLib;
                    new CurlingEngine();
                });
            } else {
                new CurlingEngine();
            }
        };
    </script>
</body>

</html>
